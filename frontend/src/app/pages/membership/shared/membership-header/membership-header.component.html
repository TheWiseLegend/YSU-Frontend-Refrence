<header class="portal-header">
  <div class="portal-header__inner">
    <!-- Logo -->
    <div class="portal-header__brand">
      <img src="/logo/ysu_logo_cropped.webp" alt="YSU" class="portal-header__logo-mark" />
      <div class="portal-header__brand-text">
        <span class="portal-header__brand-name">اتحاد الطلبة اليمنيين</span>
        <span class="portal-header__brand-sub">في ماليزيا</span>
      </div>
    </div>

    <!-- Avatar dropdown -->
    <div class="settings-wrapper">
      <button class="settings-btn" (click)="toggleSettings($event)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
          [class.rotated]="showSettings">
          <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="settings-btn__name" *ngIf="!member?.profileImageUrl">{{ memberInitials }}</span>
        <div class="member-avatar">
          <img *ngIf="member?.profileImageUrl" [src]="member!.profileImageUrl" alt="صورة شخصية" class="member-avatar__img" />
          <span *ngIf="!member?.profileImageUrl">{{ memberInitials }}</span>
        </div>
      </button>

      <div class="settings-dropdown" *ngIf="showSettings">
        <div class="dropdown-info">
          <p class="dropdown-name">{{ member?.fullNameAr }}</p>
          <p class="dropdown-id">{{ member?.membershipId }}</p>
        </div>
        <hr />
        <button class="dropdown-item" (click)="onChangeProfilePhoto()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
              fill="currentColor"/>
          </svg>
          تغيير الصورة الشخصية
        </button>
        <button class="dropdown-item" (click)="onChangePassword()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="2"/>
            <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          تغيير كلمة المرور
        </button>
        <button class="dropdown-item logout" (click)="logout()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          تسجيل الخروج
        </button>
      </div>
    </div>
  </div>
</header>
